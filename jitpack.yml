# JitPack 构建配置
# 因为 monorepo 的 Gradle 工程根在 android/ 子目录，需要显式指定。
# JitPack 会用这里的 install 命令替代默认的 ./gradlew install。
#
# 依赖坐标：com.github.szgenle.lan-beacon:lib:TAG
# 使用示例：implementation("com.github.szgenle.lan-beacon:lib:v0.2.0")

jdk:
  - 17

install:
  - cd android && ./gradlew :lib:publishToMavenLocal -xtest
